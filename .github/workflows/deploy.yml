name: deploy

# Production CD for the backend, gated on green CI + a one-click approval.
#   1. Supabase: DB migrations + edge functions (deploy-cli auto-links the project).
#   2. Railway: the cron-* services (deploy-cli `railway:crons`, ordered + bootstrapped).
# Supabase runs first and independently, so a Railway hiccup can't block a migration.
# Runs after the `ci` workflow succeeds on `main`; also available via workflow_dispatch.

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: "24"

jobs:
  deploy:
    name: Deploy backend (migrations, functions, crons)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          # Deploy exactly the commit CI went green on (workflow_run runs against the
          # default branch otherwise); fall back to the dispatched ref for manual runs.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          persist-credentials: false

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      # Pinned to match ci.yml — scripts/supabase.sh otherwise falls through to
      # `npx supabase@latest`, which drifts independently of what CI tests against.
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Critical path first — migrations + edge functions have no Railway dependency,
      # so they deploy even if the Railway step later has trouble.
      - name: Deploy Supabase migrations + edge functions
        run: >-
          pnpm --filter @cypress-ink-labs/deploy-cli cli deploy
          supabase:migrations supabase:functions:all
          --yes --json --no-color
        env:
          # deploy-cli auto-links the project (db push --linked) using these.
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Railway cron services
        run: |
          railway link --project "$RAILWAY_PROJECT_ID" --environment production
          pnpm --filter @cypress-ink-labs/deploy-cli cli deploy railway:crons --yes --json --no-color
        env:
          # Only RAILWAY_API_TOKEN — setting RAILWAY_TOKEN forces project-token mode,
          # which an account/workspace token isn't valid for.
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: b97c92f7-464e-4f77-a760-725fc9fdb5a2
