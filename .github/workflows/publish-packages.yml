name: Publish Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - packages/contracts/src/**
      - .changeset/**

concurrency:
  group: publish-packages
  cancel-in-progress: false

jobs:
  publish:
    name: Version or Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://npm.pkg.github.com
          scope: "@family-events"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish packages
        run: |
          set -euo pipefail
          for pkg_dir in packages/contracts; do
            pkg=$(node -e "console.log(require('./${pkg_dir}/package.json').name)")
            version=$(node -e "console.log(require('./${pkg_dir}/package.json').version)")
            if npm view "${pkg}@${version}" --registry https://npm.pkg.github.com version 2>/dev/null | grep -q "${version}"; then
              echo "${pkg}@${version} already published — skipping"
            else
              echo "Publishing ${pkg}@${version}"
              pnpm publish --filter "${pkg}" --no-git-checks
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
