name: Publish Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - packages/contracts/src/**
      - .changeset/**

concurrency:
  group: publish-packages
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://npm.pkg.github.com
          scope: "@cypress-ink-labs"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish
        run: |
          set -eu
          PKG_DIR=packages/contracts
          PKG=$(node -e "process.stdout.write(require('./${PKG_DIR}/package.json').name)")
          VER=$(node -e "process.stdout.write(require('./${PKG_DIR}/package.json').version)")
          PUBLISHED=$(npm view "${PKG}@${VER}" version --registry https://npm.pkg.github.com 2>/dev/null || true)
          if [ "${PUBLISHED}" = "${VER}" ]; then
            echo "${PKG}@${VER} already published"
          else
            echo "Publishing ${PKG}@${VER}"
            pnpm publish --filter "${PKG}" --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
