name: railway-cron-drift

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

concurrency:
  group: railway-cron-drift-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: true
  TF_VAR_railway_environment_id: 03e869e2-4e35-4849-84b7-6c0278c1c6fb
  TF_VAR_railway_bearer_token: ${{ secrets.RAILWAY_API_TOKEN }}

jobs:
  drift-guard:
    name: drift guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Print Railway cron diagnostics
        run: node scripts/railway-cron-drift.mjs validate || true
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.6

      - name: Validate secret
        shell: bash
        run: |
          set -euo pipefail
          : "${TF_VAR_railway_bearer_token:?missing RAILWAY_API_TOKEN secret}"

      - name: Terraform init
        run: terraform -chdir=infra/railway-cron-drift init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infra/railway-cron-drift validate

      - name: Railway cron drift guard
        run: terraform -chdir=infra/railway-cron-drift plan -input=false -lock=false -detailed-exitcode || exit 1
